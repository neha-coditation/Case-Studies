document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

e {\n  font-family: 'Plus Jakarta Sans';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"9b8824a8-601e-479b-9aa1-68f1aa63959d\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Plus Jakarta Sans';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"09e89778-c95e-49db-934c-501d8e823e7d\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Plus Jakarta Sans';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"bdf83fad-1ca4-4216-afa9-74e6a5c42c39\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Plus Jakarta Sans';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"54bb170b-d177-4c76-827b-1e4f8bb25b05\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }\n  body { margin: 0; }\n  ::selection { background: rgba(48,100,254,0.35); color:#fff; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div id=\"bp-case\" style=\"--bg:#060910;--bg2:#0A1124;--panel:#0B1A3A;--accent:#3064FE;--accent2:#0074F0;--a300:#5792FF;--a400:#4976FF;--aout:#41A2FF;--fg:#FFFFFF;--muted:#E5E5E5;--subtle:rgba(255,255,255,0.60);--faint:rgba(255,255,255,0.42);--rule:rgba(255,255,255,0.10);--rule2:rgba(255,255,255,0.16);--glass:rgba(255,255,255,0.06);position:relative;background:var(--bg);color:var(--fg);font-family:'Inter',system-ui,sans-serif;font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden;min-height:100vh;\">\n\n  <div aria-hidden=\"true\" style=\"position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(1000px 680px at 78% -8%,rgba(0,116,240,0.16),transparent 60%),radial-gradient(760px 540px at -8% 16%,rgba(48,100,254,0.10),transparent 60%),linear-gradient(rgba(255,255,255,0.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.018) 1px,transparent 1px);background-size:auto,auto,46px 46px,46px 46px;\"><\u002Fdiv>\n\n  <main style=\"position:relative;z-index:2;\">\n\n  <!-- ===== HERO ===== -->\n  <section style=\"padding:clamp(84px,12vw,150px) 0 clamp(56px,8vw,96px);position:relative;\">\n    <div style=\"max-width:1240px;margin:0 auto;padding:0 clamp(20px,5vw,100px);\">\n      <div style=\"display:flex;flex-wrap:wrap;gap:10px;margin-bottom:40px;\">\n        <span style=\"display:inline-flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;padding:9px 15px;border-radius:99px;background:var(--accent);border:1px solid var(--a400);color:#fff;\"><svg width=\"11\" height=\"11\" viewBox=\"0 0 12 12\" fill=\"currentColor\"><path d=\"M 6 0 L 7.621 4.379 L 12 6 L 7.621 7.621 L 6 12 L 4.379 7.621 L 0 6 L 4.379 4.379 Z\"><\u002Fpath><\u002Fsvg>Case Study<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;padding:9px 15px;border-radius:99px;background:var(--glass);border:1px solid var(--rule);color:var(--subtle);\">MedTech · Life Sciences<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;padding:9px 15px;border-radius:99px;background:var(--glass);border:1px solid var(--rule);color:var(--subtle);\">Hardware + Cloud<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;padding:9px 15px;border-radius:99px;background:var(--glass);border:1px solid var(--rule);color:var(--subtle);\">Product Engineering<\u002Fspan>\n      <\u002Fdiv>\n      <h1 id=\"case-study-name\" style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:clamp(38px,6vw,80px);line-height:0.98;letter-spacing:-0.03em;margin:0 0 44px;max-width:19ch;\">How a life-sciences instrument maker turned a benchtop tumor scanner into a <span style=\"color:var(--a300);\">cloud-native research platform<\u002Fspan>.<\u002Fh1>\n      <div style=\"display:grid;grid-template-columns:1.1fr 1fr;gap:60px;align-items:end;\">\n        <p id=\"case-study-description\" style=\"font-size:clamp(17px,1.7vw,21px);line-height:1.55;color:var(--muted);max-width:44ch;margin:0;\">Coditation rebuilt the client's tumor-measurement platform end to end: <strong style=\"color:var(--a300);font-weight:600;\">device integration, the entire cloud application, and subscription billing<\u002Fstrong>. It turned a single-workstation desktop tool into a SaaS product for preclinical oncology labs.<\u002Fp>\n        <dl style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin:0;\">\n          <div><dt style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--aout);margin-bottom:8px;\">Client<\u002Fdt><dd style=\"margin:0;font-weight:600;font-size:15px;\">A life-sciences firm<\u002Fdd><\u002Fdiv>\n          <div><dt style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--aout);margin-bottom:8px;\">Domain<\u002Fdt><dd style=\"margin:0;font-weight:600;font-size:15px;\">Preclinical Oncology<\u002Fdd><\u002Fdiv>\n          <div><dt style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--aout);margin-bottom:8px;\">Scope<\u002Fdt><dd style=\"margin:0;font-weight:600;font-size:15px;\">Full product build<\u002Fdd><\u002Fdiv>\n        <\u002Fdl>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== CLIENT SNAPSHOT ===== -->\n  <section style=\"padding:clamp(64px,9vw,120px) 0;background:linear-gradient(180deg,var(--bg2),var(--bg));border-top:1px solid var(--rule);border-bottom:1px solid var(--rule);\">\n    <div style=\"max-width:1240px;margin:0 auto;padding:0 clamp(20px,5vw,100px);\">\n      <div style=\"display:grid;grid-template-columns:0.85fr 1.15fr;gap:48px;align-items:end;margin-bottom:56px;\">\n        <div>\n          <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:24px;\"><span style=\"width:26px;height:1px;background:var(--accent);display:inline-block;\"><\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.18em;text-transform:uppercase;color:var(--aout);\">The Client<\u002Fspan><\u002Fdiv>\n          <h2 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:clamp(34px,4.6vw,60px);line-height:0.98;letter-spacing:-0.03em;margin:0;\">A Life-Sciences<br><span style=\"color:var(--a300);\">Instrument Maker<\u002Fspan><\u002Fh2>\n        <\u002Fdiv>\n        <p style=\"font-size:clamp(16px,1.5vw,20px);line-height:1.55;color:var(--muted);margin:0;\">Born out of a major oncology drug-discovery program, the client builds the instruments and software that pharma, biotech, CRO and academic labs use to run <strong style=\"color:var(--a300);font-weight:600;\">subcutaneous xenograft tumor studies<\u002Fstrong>, the preclinical work that decides which cancer drugs move forward.<\u002Fp>\n      <\u002Fdiv>\n      <div data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .8s cubic-bezier(.4,0,.2,1),transform .8s cubic-bezier(.4,0,.2,1);display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--rule);border:1px solid var(--rule);border-radius:12px;overflow:hidden;\">\n        <div style=\"background:var(--bg);padding:32px 28px;\"><div style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:clamp(40px,5vw,62px);line-height:1;letter-spacing:-0.02em;margin-bottom:8px;\">3D<\u002Fdiv><div style=\"font-size:14px;font-weight:600;\">Structured-light imaging<\u002Fdiv><div style=\"font-size:13px;color:var(--subtle);line-height:1.45;margin-top:4px;\">Real-color surface profiles, not caliper estimates<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:var(--bg);padding:32px 28px;\"><div style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:clamp(40px,5vw,62px);line-height:1;letter-spacing:-0.02em;margin-bottom:8px;\">Gen‑2<\u002Fdiv><div style=\"font-size:14px;font-weight:600;\">Handheld imager<\u002Fdiv><div style=\"font-size:13px;color:var(--subtle);line-height:1.45;margin-top:4px;\">Handheld &amp; hands-free tumor scanner<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:var(--bg);padding:32px 28px;\"><div style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:clamp(40px,5vw,62px);line-height:1;letter-spacing:-0.02em;margin-bottom:8px;\">4<\u002Fdiv><div style=\"font-size:14px;font-weight:600;\">Customer segments<\u002Fdiv><div style=\"font-size:13px;color:var(--subtle);line-height:1.45;margin-top:4px;\">Pharma, biotech, CRO &amp; academia<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:var(--bg);padding:32px 28px;\"><div style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:clamp(40px,5vw,62px);line-height:1;letter-spacing:-0.02em;margin-bottom:8px;\">TDT<span style=\"font-size:0.4em;color:var(--a300);vertical-align:0.7em;font-weight:600;\"> LCK T/C<\u002Fspan><\u002Fdiv><div style=\"font-size:14px;font-weight:600;\">Study metrics automated<\u002Fdiv><div style=\"font-size:13px;color:var(--subtle);line-height:1.45;margin-top:4px;\">Calculated &amp; plotted after every scan<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:var(--bg);padding:32px 28px;\"><div style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:clamp(40px,5vw,62px);line-height:1;letter-spacing:-0.02em;margin-bottom:8px;\">1<span style=\"font-size:0.4em;color:var(--a300);vertical-align:0.7em;font-weight:600;\">st<\u002Fspan><\u002Fdiv><div style=\"font-size:14px;font-weight:600;\">Of its kind<\u002Fdiv><div style=\"font-size:13px;color:var(--subtle);line-height:1.45;margin-top:4px;\">Patented tumor-isolation algorithms<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:var(--bg);padding:32px 28px;\"><div style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:clamp(40px,5vw,62px);line-height:1;letter-spacing:-0.02em;margin-bottom:8px;\">US<\u002Fdiv><div style=\"font-size:14px;font-weight:600;\">United States<\u002Fdiv><div style=\"font-size:13px;color:var(--subtle);line-height:1.45;margin-top:4px;\">Roots in oncology drug-discovery R&amp;D<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== THE BACKDROP ===== -->\n  <section style=\"padding:clamp(64px,9vw,128px) 0;position:relative;\">\n    <div style=\"max-width:1240px;margin:0 auto;padding:0 clamp(20px,5vw,100px);\">\n      <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:26px;\"><span style=\"width:26px;height:1px;background:var(--accent);display:inline-block;\"><\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.18em;text-transform:uppercase;color:var(--aout);\">The Backdrop<\u002Fspan><\u002Fdiv>\n      <h2 data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .8s cubic-bezier(.4,0,.2,1),transform .8s cubic-bezier(.4,0,.2,1);font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:clamp(30px,4.2vw,54px);line-height:1.05;letter-spacing:-0.025em;margin:0 0 48px;max-width:24ch;\">Great science was trapped behind <span style=\"color:var(--a300);\">a desktop instrument<\u002Fspan>.<\u002Fh2>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:28px;\">\n        <article data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .8s cubic-bezier(.4,0,.2,1),transform .8s cubic-bezier(.4,0,.2,1);\">\n          <h3 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:22px;letter-spacing:-0.01em;margin:0 0 14px;\">Calipers guess. The lab needs truth.<\u002Fh3>\n          <p style=\"color:var(--muted);line-height:1.6;margin:0;font-size:16px;\">The industry standard, measuring a tumor's length and width with a caliper, <span style=\"color:var(--a300);font-weight:600;\">assumes the tumor is a perfect ellipsoid<\u002Fspan> and sets pi to 3. The client's structured-light scanner already solved this with true 3D volume. But its output lived on one machine, in one room.<\u002Fp>\n        <\u002Farticle>\n        <article data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .8s cubic-bezier(.4,0,.2,1),transform .8s cubic-bezier(.4,0,.2,1);transition-delay:.08s;\">\n          <h3 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:22px;letter-spacing:-0.01em;margin:0 0 14px;\">Desktop software can't scale a science business.<\u002Fh3>\n          <p style=\"color:var(--muted);line-height:1.6;margin:0;font-size:16px;\">The study software stored everything in a <span style=\"color:var(--a300);font-weight:600;\">local MS SQL Server database<\u002Fspan>. Powerful, but tethered: no remote access, manual backups, painful updates, and no way to sell it as a modern, recurring product. The value was real, the delivery model was from another era.<\u002Fp>\n        <\u002Farticle>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== THE CHALLENGE ===== -->\n  <section style=\"padding:clamp(64px,9vw,128px) 0;background:linear-gradient(180deg,var(--bg2),var(--bg));border-top:1px solid var(--rule);border-bottom:1px solid var(--rule);\">\n    <div style=\"max-width:1240px;margin:0 auto;padding:0 clamp(20px,5vw,100px);\">\n      <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:26px;\"><span style=\"width:26px;height:1px;background:var(--accent);display:inline-block;\"><\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.18em;text-transform:uppercase;color:var(--aout);\">The Challenge<\u002Fspan><\u002Fdiv>\n      <h2 data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .8s cubic-bezier(.4,0,.2,1),transform .8s cubic-bezier(.4,0,.2,1);font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:clamp(30px,4.2vw,54px);line-height:1.05;letter-spacing:-0.025em;margin:0 0 24px;max-width:22ch;\">A world-class instrument, held back by <span style=\"color:var(--a300);\">four hard walls<\u002Fspan>.<\u002Fh2>\n      <p data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .8s cubic-bezier(.4,0,.2,1),transform .8s cubic-bezier(.4,0,.2,1);font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;font-size:clamp(20px,2.2vw,28px);line-height:1.3;letter-spacing:-0.015em;margin:0 0 56px;max-width:26ch;\">The client didn't need a new feature. They needed the whole product <span style=\"color:var(--a300);\">re-imagined for the cloud<\u002Fspan>.<\u002Fp>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--rule);border:1px solid var(--rule);border-radius:12px;overflow:hidden;\">\n        <div data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .8s cubic-bezier(.4,0,.2,1),transform .8s cubic-bezier(.4,0,.2,1);background:var(--panel);padding:34px 30px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--aout);letter-spacing:0.2em;margin-bottom:18px;\">01 / HARDWARE<\u002Fdiv>\n          <h4 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:20px;letter-spacing:-0.01em;margin:0 0 12px;\">Scanner locked to one workstation<\u002Fh4>\n          <p style=\"margin:0;color:var(--muted);line-height:1.55;font-size:15px;\">The scanner streamed structured-light scans into a single PC. Data lived <strong style=\"color:var(--a300);font-weight:600;\">where the device was plugged in<\u002Fstrong>, no path to the cloud, no second machine, no remote review.<\u002Fp>\n        <\u002Fdiv>\n        <div data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .8s cubic-bezier(.4,0,.2,1),transform .8s cubic-bezier(.4,0,.2,1);transition-delay:.08s;background:var(--panel);padding:34px 30px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--aout);letter-spacing:0.2em;margin-bottom:18px;\">02 / SOFTWARE<\u002Fdiv>\n          <h4 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:20px;letter-spacing:-0.01em;margin:0 0 12px;\">A desktop app that couldn't travel<\u002Fh4>\n          <p style=\"margin:0;color:var(--muted);line-height:1.55;font-size:15px;\">The study-management app was a Windows application on a <strong style=\"color:var(--a300);font-weight:600;\">local SQL Server<\u002Fstrong>. Every install was a manual deployment; every update, a site visit. Collaboration across labs was effectively impossible.<\u002Fp>\n        <\u002Fdiv>\n        <div data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .8s cubic-bezier(.4,0,.2,1),transform .8s cubic-bezier(.4,0,.2,1);background:var(--panel);padding:34px 30px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--aout);letter-spacing:0.2em;margin-bottom:18px;\">03 / DATA &amp; COMPLIANCE<\u002Fdiv>\n          <h4 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:20px;letter-spacing:-0.01em;margin:0 0 12px;\">Study data siloed and at risk<\u002Fh4>\n          <p style=\"margin:0;color:var(--muted);line-height:1.55;font-size:15px;\">Audit trails and results sat in isolated databases with <strong style=\"color:var(--a300);font-weight:600;\">manual backups<\u002Fstrong>. For regulated preclinical work, that's a governance and continuity risk, and a barrier to multi-site programs.<\u002Fp>\n        <\u002Fdiv>\n        <div data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .8s cubic-bezier(.4,0,.2,1),transform .8s cubic-bezier(.4,0,.2,1);transition-delay:.08s;background:var(--panel);padding:34px 30px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--aout);letter-spacing:0.2em;margin-bottom:18px;\">04 / BUSINESS MODEL<\u002Fdiv>\n          <h4 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:20px;letter-spacing:-0.01em;margin:0 0 12px;\">One-time sales, no recurring engine<\u002Fh4>\n          <p style=\"margin:0;color:var(--muted);line-height:1.55;font-size:15px;\">The product shipped as hardware plus a perpetual license. There was <strong style=\"color:var(--a300);font-weight:600;\">no subscription, no self-serve provisioning, no usage visibility<\u002Fstrong>, the foundations a SaaS business needs to grow.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== THE SOLUTION ===== -->\n  <section style=\"padding:clamp(64px,9vw,128px) 0;position:relative;\">\n    <div style=\"max-width:1240px;margin:0 auto;padding:0 clamp(20px,5vw,100px);\">\n      <div style=\"display:grid;grid-template-columns:1.05fr 0.95fr;gap:56px;align-items:start;\">\n        <div data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .8s cubic-bezier(.4,0,.2,1),transform .8s cubic-bezier(.4,0,.2,1);\">\n          <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:26px;\"><span style=\"width:26px;height:1px;background:var(--accent);display:inline-block;\"><\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.18em;text-transform:uppercase;color:var(--aout);\">The Solution<\u002Fspan><\u002Fdiv>\n          <h2 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:clamp(30px,4.2vw,54px);line-height:1.02;letter-spacing:-0.028em;margin:0 0 24px;\">We didn't modernize a module. <span style=\"color:var(--a300);\">We built the whole product.<\u002Fspan><\u002Fh2>\n          <p style=\"color:var(--muted);line-height:1.6;font-size:18px;margin:0;max-width:50ch;\">Coditation became the client's end-to-end product-engineering partner. We took the device integration, re-architected the desktop application into a multi-tenant cloud platform, and stood up the subscription and billing engine that turned an instrument company into a SaaS company, one connected system, from the scanner in the biosafety hood to the invoice.<\u002Fp>\n        <\u002Fdiv>\n        <ul data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .8s cubic-bezier(.4,0,.2,1),transform .8s cubic-bezier(.4,0,.2,1);transition-delay:.08s;list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:14px;\">\n          <li style=\"padding:24px 26px;background:var(--panel);border:1px solid var(--rule);border-radius:10px;display:flex;gap:20px;align-items:flex-start;box-shadow:3px 4px 10px rgba(0,0,0,0.10),10px 14px 17px rgba(0,0,0,0.09);\"><span style=\"font-family:'JetBrains Mono',monospace;color:var(--aout);font-size:13px;padding-top:2px;flex-shrink:0;\">01 →<\u002Fspan><div><h5 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:17px;margin:0 0 6px;letter-spacing:-0.01em;\">Connect the hardware to the cloud<\u002Fh5><p style=\"margin:0;color:var(--subtle);font-size:14.5px;line-height:1.5;\">Bridge the scanner's structured-light capture into a secure cloud pipeline, no lost fidelity, no manual export.<\u002Fp><\u002Fdiv><\u002Fli>\n          <li style=\"padding:24px 26px;background:var(--panel);border:1px solid var(--rule);border-radius:10px;display:flex;gap:20px;align-items:flex-start;box-shadow:3px 4px 10px rgba(0,0,0,0.10),10px 14px 17px rgba(0,0,0,0.09);\"><span style=\"font-family:'JetBrains Mono',monospace;color:var(--aout);font-size:13px;padding-top:2px;flex-shrink:0;\">02 →<\u002Fspan><div><h5 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:17px;margin:0 0 6px;letter-spacing:-0.01em;\">Rebuild the study software for the web<\u002Fh5><p style=\"margin:0;color:var(--subtle);font-size:14.5px;line-height:1.5;\">Every workflow, protocols, randomization, dosing, TDT/LCK/T-C, reporting, re-engineered multi-tenant and browser-native.<\u002Fp><\u002Fdiv><\u002Fli>\n          <li style=\"padding:24px 26px;background:var(--panel);border:1px solid var(--rule);border-radius:10px;display:flex;gap:20px;align-items:flex-start;box-shadow:3px 4px 10px rgba(0,0,0,0.10),10px 14px 17px rgba(0,0,0,0.09);\"><span style=\"font-family:'JetBrains Mono',monospace;color:var(--aout);font-size:13px;padding-top:2px;flex-shrink:0;\">03 →<\u002Fspan><div><h5 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:17px;margin:0 0 6px;letter-spacing:-0.01em;\">Turn it into a subscription business<\u002Fh5><p style=\"margin:0;color:var(--subtle);font-size:14.5px;line-height:1.5;\">Plans, metering, self-serve provisioning and automated billing, the commercial engine for recurring revenue.<\u002Fp><\u002Fdiv><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== ARCHITECTURE / WHAT WE BUILT ===== -->\n  <section style=\"padding:clamp(64px,9vw,128px) 0;background:linear-gradient(180deg,var(--bg2),var(--bg));border-top:1px solid var(--rule);border-bottom:1px solid var(--rule);\">\n    <div style=\"max-width:1240px;margin:0 auto;padding:0 clamp(20px,5vw,100px);\">\n      <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:26px;\"><span style=\"width:26px;height:1px;background:var(--accent);display:inline-block;\"><\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.18em;text-transform:uppercase;color:var(--aout);\">What We Built<\u002Fspan><\u002Fdiv>\n      <h2 data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .8s cubic-bezier(.4,0,.2,1),transform .8s cubic-bezier(.4,0,.2,1);font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:clamp(30px,4.2vw,54px);line-height:1.05;letter-spacing:-0.025em;margin:0 0 48px;max-width:22ch;\">Four layers. <span style=\"color:var(--a300);\">One connected product.<\u002Fspan><\u002Fh2>\n      <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:24px;\">\n        <article data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .8s cubic-bezier(.4,0,.2,1),transform .8s cubic-bezier(.4,0,.2,1);padding:34px 30px;background:var(--panel);border:1px solid var(--rule);border-radius:10px;display:flex;flex-direction:column;gap:16px;box-shadow:3px 4px 10px rgba(0,0,0,0.10),10px 14px 17px rgba(0,0,0,0.09);position:relative;overflow:hidden;\">\n          <svg width=\"48\" height=\"48\" viewBox=\"0 0 48 48\" fill=\"none\" stroke=\"var(--a300)\" stroke-width=\"1.5\"><rect x=\"7\" y=\"10\" width=\"34\" height=\"22\" rx=\"2\"><\u002Frect><path d=\"M13 38 H 35\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M18 32 V 38 M30 32 V 38\"><\u002Fpath><path d=\"M14 21 H 34\" stroke-dasharray=\"2 3\"><\u002Fpath><circle cx=\"24\" cy=\"21\" r=\"3.5\" fill=\"var(--a300)\" stroke=\"none\"><\u002Fcircle><\u002Fsvg>\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--aout);\">Layer 01 · Hardware<\u002Fspan>\n          <h3 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:23px;line-height:1.18;letter-spacing:-0.018em;margin:0;\">Device Integration Bridge<\u002Fh3>\n          <p style=\"margin:0;color:var(--muted);line-height:1.55;font-size:15px;\">A firmware-to-cloud pipeline that captures the scanner's structured-light scans, 3D surface profile plus real-color image, and streams them securely to the platform. Live tumor volume still plots on the growth curve at the bench; the record now lives in the cloud the instant the scan is accepted.<\u002Fp>\n          <div style=\"margin-top:auto;padding-top:14px;border-top:1px solid var(--rule);font-size:14px;color:var(--subtle);\"><strong style=\"display:block;color:var(--a300);font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:26px;letter-spacing:-0.02em;margin-bottom:4px;\">Bench → Cloud<\u002Fstrong>every scan captured automatically<\u002Fdiv>\n        <\u002Farticle>\n        <article data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .8s cubic-bezier(.4,0,.2,1),transform .8s cubic-bezier(.4,0,.2,1);transition-delay:.06s;padding:34px 30px;background:var(--panel);border:1px solid var(--rule);border-radius:10px;display:flex;flex-direction:column;gap:16px;box-shadow:3px 4px 10px rgba(0,0,0,0.10),10px 14px 17px rgba(0,0,0,0.09);position:relative;overflow:hidden;\">\n          <svg width=\"48\" height=\"48\" viewBox=\"0 0 48 48\" fill=\"none\" stroke=\"var(--a300)\" stroke-width=\"1.5\"><path d=\"M8 34 L 18 24 L 26 30 L 40 14\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><circle cx=\"8\" cy=\"34\" r=\"2.5\" fill=\"var(--a300)\" stroke=\"none\"><\u002Fcircle><circle cx=\"18\" cy=\"24\" r=\"2.5\" fill=\"var(--a300)\" stroke=\"none\"><\u002Fcircle><circle cx=\"26\" cy=\"30\" r=\"2.5\" fill=\"var(--a300)\" stroke=\"none\"><\u002Fcircle><circle cx=\"40\" cy=\"14\" r=\"2.5\" fill=\"var(--a300)\" stroke=\"none\"><\u002Fcircle><path d=\"M8 40 H 40\" stroke-dasharray=\"2 4\"><\u002Fpath><\u002Fsvg>\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--aout);\">Layer 02 · Application<\u002Fspan>\n          <h3 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:23px;line-height:1.18;letter-spacing:-0.018em;margin:0;\">Cloud Study Platform<\u002Fh3>\n          <p style=\"margin:0;color:var(--muted);line-height:1.55;font-size:15px;\">The full study-management suite rebuilt as a browser-native, multi-tenant application: protocol design, animal randomization, dosing calculation, automated data capture, and real-time TDT, LCK and T/C analytics, recalculated and plotted after every measurement, publishable reports on demand.<\u002Fp>\n          <div style=\"margin-top:auto;padding-top:14px;border-top:1px solid var(--rule);font-size:14px;color:var(--subtle);\"><strong style=\"display:block;color:var(--a300);font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:26px;letter-spacing:-0.02em;margin-bottom:4px;\">Real-time<\u002Fstrong>metrics after every scan<\u002Fdiv>\n        <\u002Farticle>\n        <article data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .8s cubic-bezier(.4,0,.2,1),transform .8s cubic-bezier(.4,0,.2,1);padding:34px 30px;background:var(--panel);border:1px solid var(--rule);border-radius:10px;display:flex;flex-direction:column;gap:16px;box-shadow:3px 4px 10px rgba(0,0,0,0.10),10px 14px 17px rgba(0,0,0,0.09);position:relative;overflow:hidden;\">\n          <svg width=\"48\" height=\"48\" viewBox=\"0 0 48 48\" fill=\"none\" stroke=\"var(--a300)\" stroke-width=\"1.5\"><path d=\"M14 30 a 8 8 0 0 1 0.6 -15.9 a 11 11 0 0 1 21 3 a 7 7 0 0 1 -1.6 13.9 Z\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M24 34 V 22 M24 22 L 20 26 M24 22 L 28 26\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--aout);\">Layer 03 · Imaging<\u002Fspan>\n          <h3 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:23px;line-height:1.18;letter-spacing:-0.018em;margin:0;\">3D Measurement Engine<\u002Fh3>\n          <p style=\"margin:0;color:var(--muted);line-height:1.55;font-size:15px;\">The client's patented tumor-isolation algorithms, brought into a cloud compute pipeline. From projected light patterns the engine reconstructs the animal surface, isolates the tumor, and computes volume, area and custom statistics, with color image and surface profile logged for audit and re-analysis.<\u002Fp>\n          <div style=\"margin-top:auto;padding-top:14px;border-top:1px solid var(--rule);font-size:14px;color:var(--subtle);\"><strong style=\"display:block;color:var(--a300);font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:26px;letter-spacing:-0.02em;margin-bottom:4px;\">True 3D<\u002Fstrong>volume, not ellipsoid estimate<\u002Fdiv>\n        <\u002Farticle>\n        <article data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .8s cubic-bezier(.4,0,.2,1),transform .8s cubic-bezier(.4,0,.2,1);transition-delay:.06s;padding:34px 30px;background:var(--panel);border:1px solid var(--rule);border-radius:10px;display:flex;flex-direction:column;gap:16px;box-shadow:3px 4px 10px rgba(0,0,0,0.10),10px 14px 17px rgba(0,0,0,0.09);position:relative;overflow:hidden;\">\n          <svg width=\"48\" height=\"48\" viewBox=\"0 0 48 48\" fill=\"none\" stroke=\"var(--a300)\" stroke-width=\"1.5\"><rect x=\"7\" y=\"13\" width=\"34\" height=\"22\" rx=\"3\"><\u002Frect><path d=\"M7 20 H 41\" stroke-width=\"2\"><\u002Fpath><path d=\"M13 28 H 22 M28 28 H 35\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--aout);\">Layer 04 · Commerce<\u002Fspan>\n          <h3 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:23px;line-height:1.18;letter-spacing:-0.018em;margin:0;\">Subscription &amp; Billing<\u002Fh3>\n          <p style=\"margin:0;color:var(--muted);line-height:1.55;font-size:15px;\">The commercial engine that made the client a SaaS business: multi-tenant workspaces, subscription plans, self-serve provisioning, seat and usage metering, automated invoicing and renewals, with the admin tooling to manage accounts, entitlements and lifecycle across every lab.<\u002Fp>\n          <div style=\"margin-top:auto;padding-top:14px;border-top:1px solid var(--rule);font-size:14px;color:var(--subtle);\"><strong style=\"display:block;color:var(--a300);font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:26px;letter-spacing:-0.02em;margin-bottom:4px;\">Recurring<\u002Fstrong>revenue, self-serve provisioning<\u002Fdiv>\n        <\u002Farticle>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== IMPLEMENTATION ===== -->\n  <section style=\"padding:clamp(64px,9vw,128px) 0;position:relative;\">\n    <div style=\"max-width:1240px;margin:0 auto;padding:0 clamp(20px,5vw,100px);\">\n      <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:26px;\"><span style=\"width:26px;height:1px;background:var(--accent);display:inline-block;\"><\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.18em;text-transform:uppercase;color:var(--aout);\">How We Built It<\u002Fspan><\u002Fdiv>\n      <h2 data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .8s cubic-bezier(.4,0,.2,1),transform .8s cubic-bezier(.4,0,.2,1);font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:clamp(30px,4.2vw,54px);line-height:1.05;letter-spacing:-0.025em;margin:0 0 56px;max-width:22ch;\">From legacy desktop to <span style=\"color:var(--a300);\">live SaaS<\u002Fspan>, phase by phase.<\u002Fh2>\n      <div style=\"display:flex;flex-direction:column;\">\n        <div data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .8s cubic-bezier(.4,0,.2,1),transform .8s cubic-bezier(.4,0,.2,1);display:grid;grid-template-columns:180px 1fr;gap:8px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--aout);letter-spacing:0.08em;padding-top:2px;\">01 / DISCOVERY<\u002Fdiv>\n          <div style=\"border-left:1px solid var(--rule);padding:0 0 40px 32px;position:relative;\">\n            <span style=\"position:absolute;left:-4.5px;top:6px;width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px rgba(48,100,254,0.12);\"><\u002Fspan>\n            <h4 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:20px;letter-spacing:-0.01em;margin:0 0 10px;\">Reverse-engineer the legacy system<\u002Fh4>\n            <p style=\"margin:0;color:var(--muted);line-height:1.55;max-width:62ch;font-size:15.5px;\">We mapped the desktop application, the MS SQL Server schema, the device capture flow and the patented measurement algorithms, documenting every study workflow and compliance requirement before writing a line of new code.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .8s cubic-bezier(.4,0,.2,1),transform .8s cubic-bezier(.4,0,.2,1);display:grid;grid-template-columns:180px 1fr;gap:8px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--aout);letter-spacing:0.08em;padding-top:2px;\">02 / ARCHITECTURE<\u002Fdiv>\n          <div style=\"border-left:1px solid var(--rule);padding:0 0 40px 32px;position:relative;\">\n            <span style=\"position:absolute;left:-4.5px;top:6px;width:8px;height:8px;border-radius:50%;background:var(--accent);\"><\u002Fspan>\n            <h4 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:20px;letter-spacing:-0.01em;margin:0 0 10px;\">Design the multi-tenant cloud<\u002Fh4>\n            <p style=\"margin:0;color:var(--muted);line-height:1.55;max-width:62ch;font-size:15.5px;\">A cloud-native architecture with tenant isolation, managed database, object storage for scans and images, and a services layer for the imaging engine, scoped so a single lab and a global pharma could share one platform safely.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .8s cubic-bezier(.4,0,.2,1),transform .8s cubic-bezier(.4,0,.2,1);display:grid;grid-template-columns:180px 1fr;gap:8px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--aout);letter-spacing:0.08em;padding-top:2px;\">03 / INTEGRATION<\u002Fdiv>\n          <div style=\"border-left:1px solid var(--rule);padding:0 0 40px 32px;position:relative;\">\n            <span style=\"position:absolute;left:-4.5px;top:6px;width:8px;height:8px;border-radius:50%;background:var(--accent);\"><\u002Fspan>\n            <h4 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:20px;letter-spacing:-0.01em;margin:0 0 10px;\">Connect the scanner &amp; port the engine<\u002Fh4>\n            <p style=\"margin:0;color:var(--muted);line-height:1.55;max-width:62ch;font-size:15.5px;\">We built the device bridge, brought the structured-light capture and tumor-isolation algorithms into the cloud pipeline, and validated 3D volume and area output against the original instrument to guarantee scientific parity.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .8s cubic-bezier(.4,0,.2,1),transform .8s cubic-bezier(.4,0,.2,1);display:grid;grid-template-columns:180px 1fr;gap:8px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--aout);letter-spacing:0.08em;padding-top:2px;\">04 / COMMERCE<\u002Fdiv>\n          <div style=\"border-left:1px solid var(--rule);padding:0 0 40px 32px;position:relative;\">\n            <span style=\"position:absolute;left:-4.5px;top:6px;width:8px;height:8px;border-radius:50%;background:var(--accent);\"><\u002Fspan>\n            <h4 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:20px;letter-spacing:-0.01em;margin:0 0 10px;\">Ship subscriptions &amp; billing<\u002Fh4>\n            <p style=\"margin:0;color:var(--muted);line-height:1.55;max-width:62ch;font-size:15.5px;\">Plans, metering, provisioning, invoicing and renewals, plus the admin console to run it all. The moment a customer signs up, their workspace is live and their subscription is managed automatically.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .8s cubic-bezier(.4,0,.2,1),transform .8s cubic-bezier(.4,0,.2,1);display:grid;grid-template-columns:180px 1fr;gap:8px;\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--aout);letter-spacing:0.08em;padding-top:2px;\">05 / ONGOING<\u002Fdiv>\n          <div style=\"padding:0 0 0 32px;position:relative;\">\n            <span style=\"position:absolute;left:-4.5px;top:6px;width:8px;height:8px;border-radius:50%;background:var(--accent);\"><\u002Fspan>\n            <h4 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:20px;letter-spacing:-0.01em;margin:0 0 10px;\">Operate, harden &amp; evolve<\u002Fh4>\n            <p style=\"margin:0;color:var(--muted);line-height:1.55;max-width:62ch;font-size:15.5px;\">A continuing partnership: reliability, security and compliance hardening, new capabilities on the platform, and support as the client rolls the product out to more labs and customer segments.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== RESULTS ===== -->\n  <section style=\"padding:clamp(72p L Server → multi-tenant SaaS<\u002Fdiv>\n        <\u002Fdiv>\n        <div data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .8s cubic-bezier(.4,0,.2,1),transform .8s cubic-bezier(.4,0,.2,1);transition-delay:.06s;background:var(--bg);padding:38px 26px;text-align:center;\">\n          <div style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:clamp(22px,2.6vw,34px);letter-spacing:-0.02em;line-height:1.1;margin-bottom:14px;\">Caliper<br><span style=\"color:var(--a300);font-size:0.7em;\">↓<\u002Fspan><br>3D scan<\u002Fdiv>\n          <div style=\"font-size:14px;font-weight:600;margin-bottom:6px;\">Measurement<\u002Fdiv>\n          <div style=\"font-size:13px;color:var(--subtle);line-height:1.4;\">Ellipsoid estimate → true volume<\u002Fdiv>\n        <\u002Fdiv>\n        <div data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .8s cubic-bezier(.4,0,.2,1),transform .8s cubic-bezier(.4,0,.2,1);transition-delay:.12s;background:var(--bg);padding:38px 26px;text-align:center;\">\n          <div style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:clamp(22px,2.6vw,34px);letter-spacing:-0.02em;line-height:1.1;margin-bottom:14px;\">License<br><span style=\"color:var(--a300);font-size:0.7em;\">↓<\u002Fspan><br>Subscription<\u002Fdiv>\n          <div style=\"font-size:14px;font-weight:600;margin-bottom:6px;\">Business model<\u002Fdiv>\n          <div style=\"font-size:13px;color:var(--subtle);line-height:1.4;\">One-time sale → recurring revenue<\u002Fdiv>\n        <\u002Fdiv>\n        <div data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .8s cubic-bezier(.4,0,.2,1),transform .8s cubic-bezier(.4,0,.2,1);transition-delay:.18s;background:var(--bg);padding:38px 26px;text-align:center;\">\n          <div style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:clamp(22px,2.6vw,34px);letter-spacing:-0.02em;line-height:1.1;margin-bottom:14px;\">1 site<br><span style=\"color:var(--a300);font-size:0.7em;\">↓<\u002Fspan><br>Every lab<\u002Fdiv>\n          <div style=\"font-size:14px;font-weight:600;margin-bottom:6px;\">Reach<\u002Fdiv>\n          <div style=\"font-size:13px;color:var(--subtle);line-height:1.4;\">Single workstation → anywhere access<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1.2fr 1fr;gap:48px;margin-top:56px;align-items:center;\">\n        <p data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .8s cubic-bezier(.4,0,.2,1),transform .8s cubic-bezier(.4,0,.2,1);font-size:18px;line-height:1.6;color:var(--muted);margin:0;\">The scientific core the client spent years perfecting, structured-light imaging and patented tumor isolation, is now delivered as a modern cloud product. Labs work from anywhere, data is captured automatically the moment a scan is accepted, and the business finally has the <strong style=\"color:var(--a300);font-weight:600;\">recurring-revenue foundation<\u002Fstrong> to scale.<\u002Fp>\n        <p data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .8s cubic-bezier(.4,0,.2,1),transform .8s cubic-bezier(.4,0,.2,1);transition-delay:.08s;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;font-size:clamp(20px,2.1vw,26px);line-height:1.3;letter-spacing:-0.015em;color:var(--fg);border-left:2px solid var(--accent);padding-left:24px;margin:0;\">One partner took the client from an instrument on a bench to a <span style=\"color:var(--a300);\">SaaS platform in the cloud.<\u002Fspan><\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== THE TRANSFORMATION ===== -->\n  <section style=\"padding:clamp(64px,9vw,128px) 0;position:relative;\">\n    <div style=\"max-width:1240px;margin:0 auto;padding:0 clamp(20px,5vw,100px);\">\n      <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:26px;\"><span style=\"width:26 0,0,0,0.10);\"><h5 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:18px;margin:0 0 12px;letter-spacing:-0.01em;\">Engagement model<\u002Fh5><p style=\"font-size:14.5px;margin:0;color:var(--muted);line-height:1.55;\">Discovery &amp; reverse-engineering → architecture → build → launch → ongoing product partnership.<\u002Fp><\u002Fdiv>\n        <div data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .8s cubic-bezier(.4,0,.2,1),transform .8s cubic-bezier(.4,0,.2,1);transition-delay:.06s;padding:28px;background:var(--panel);border:1px solid var(--rule);border-radius:10px;box-shadow:3px 4px 10px rgba(0,0,0,0.10);\"><h5 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:18px;margin:0 0 12px;letter-spacing:-0.01em;\">Cross-functional team<\u002Fh5><p style=\"font-size:14.5px;margin:0;color:var(--muted);line-height:1.55;\">Device &amp; firmware, cloud &amp; backend, imaging/algorithms, DevOps, UI/UX, and SaaS commerce in one squad.<\u002Fp><\u002Fdiv>\n        <div data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .8s cubic-bezier(.4,0,.2,1),transform .8s cubic-bezier(.4,0,.2,1);transition-delay:.12s;padding:28px;background:var(--panel);border:1px solid var(--rule);border-radius:10px;box-shadow:3px 4px 10px rgba(0,0,0,0.10);\"><h5 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:18px;margin:0 0 12px;letter-spacing:-0.01em;\">Tech stack<\u002Fh5><p style=\"font-size:14.5px;margin:0;color:var(--muted);line-height:1.55;\">Device SDK &amp; firmware bridge, React &amp; TypeScript, cloud services, managed database, object storage, subscription billing, cloud-native infrastructure.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== CTA ===== -->\n  <section style=\"padding:clamp(72px,10vw,140px) 0;position:relative;background:linear-gradient(180deg,var(--bg2),var(--bg));border-top:1px solid var(--rule);overflow:hidden;\">\n    <div aria-hidden=\"true\" style=\"position:absolute;inset:0;pointer-events:none;background:radial-gradient(760px 420px at 72% 50%,rgba(0,116,240,0.16),transparent 62%);\"><\u002Fdiv>\n    <div style=\"max-width:1240px;margin:0 auto;padding:0 clamp(20px,5vw,100px);position:relative;\">\n      <div style=\"display:grid;grid-template-columns:1.2fr 0.8fr;gap:56px;align-items:center;\">\n        <div data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .8s cubic-bezier(.4,0,.2,1),transform .8s cubic-bezier(.4,0,.2,1);\">\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.18em;text-transform:uppercase;color:var(--aout);display:block;margin-bottom:18px;\">What's Next<\u002Fspan>\n          <h2 style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:clamp(32px,4.6vw,56px);line-height:1.04;letter-spacing:-0.025em;margin:0 0 16px;\">Have a product to build, hardware, cloud, or <span style=\"color:var(--a300);\">both?<\u002Fspan><\u002Fh2>\n          <p style=\"color:var(--muted);font-size:17px;line-height:1.55;margin:0;max-width:46ch;\">Tell us what you've built and where it's stuck. We'll help you take it end to end, from the device to the subscription.<\u002Fp>\n        <\u002Fdiv>\n        <div data-reveal=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .8s cubic-bezier(.4,0,.2,1),transform .8s cubic-bezier(.4,0,.2,1);transition-delay:.08s;display:flex;flex-direction:column;gap:14px;\">\n          <a href=\"#\" style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px 24px;font-weight:700;font-size:15px;letter-spacing:0.02em;border-radius:4px;background:var(--accent);border:1px solid var(--a400);color:#fff;text-decoration:none;box-shadow:0px 2px 1px -1px rgba(0,0,0,0.2),0px 1px 3px rgba(0,0,0,0.12);\"><span>Book a discovery call<\u002Fspan><span>→<\u002Fspan><\u002Fa>\n          <a href=\"#\" style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px 24px;font-weight:700;font-size:15px;letter-spacing:0.02em;border-radius:4px;background:transparent;border:1px solid var(--aout);color:var(--aout);text-decoration:none;\"><span>Download the PDF case study<\u002Fspan><span>↓<\u002Fspan><\u002Fa>\n          <a href=\"#\" style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px 24px;font-weight:700;font-size:15px;letter-spacing:0.02em;border-radius:4px;background:transparent;border:1px solid var(--aout);color:var(--aout);text-decoration:none;\"><span>More case studies<\u002Fspan><span>→<\u002Fspan><\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== FOOTER ===== -->\n  <footer style=\"position:relative;background:var(--bg);border-top:1px solid var(--rule);overflow:hidden;padding:56px 0 64px;\">\n    <div style=\"max-width:1240px;margin:0 auto;padding:0 clamp(20px,5vw,100px);position:relative;display:flex;justify-content:space-between;align-items:center;gap:24px;flex-wrap:wrap;\">\n      <div style=\"font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:20px;letter-spacing:-0.02em;\">Coditation<\u002Fdiv>\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--faint);letter-spacing:0.04em;\">Preclinical Oncology Platform · Case Study<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900},&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#3064FE&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Theme&quot;}}\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    const root = document.getElementById('bp-case');\n    if (!root) return;\n\n    // Accent override from prop\n    const acc = this.props.accentColor;\n    if (acc) {\n      root.style.setProperty('--accent', acc);\n      root.style.setProperty('--a400', acc);\n    }\n\n    // Reveal on scroll\n    const io = new IntersectionObserver((entries) => {\n      entries.forEach((e) => {\n        if (e.isIntersecting) {\n          e.target.style.opacity = '1';\n          e.target.style.transform = 'none';\n          io.unobserve(e.target);\n        }\n      });\n    }, { threshold: 0.12, rootMargin: '0px 0px -70px 0px' });\n    root.querySelectorAll('[data-reveal]').forEach((el) => io.observe(el));\n\n    // Animate bars\n    const bo = new IntersectionObserver((entries) => {\n      entries.forEach((e) => {\n        if (e.isIntersecting) {\n          const el = e.target;\n          const pct = parseFloat(el.getAttribute('data-bar'));\n          requestAnimationFrame(() => { el.style.width = pct + '%'; });\n          bo.unobserve(el);\n        }\n      });\n    }, { threshold: 0.4 });\n    root.querySelectorAll('[data-bar]').forEach((el) => bo.observe(el));\n  }\n\n  renderVals() { return {}; }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
