name: Sync Case Studies to Webflow

on:
  push:
    branches:
      - main
    paths:
      - "*.html"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Sync HTML to Webflow CMS
        env:
          WEBFLOW_TOKEN: ${{ secrets.WEBFLOW_TOKEN }}
          COLLECTION_ID: ${{ secrets.COLLECTION_ID }}
          GITHUB_PAGES: https://neha-coditation.github.io/Case-Studies
          HTML_FILE: moving-storage-enterprise.html
        run: |
          python scripts/sync_webflow.py



