name: Sync GitHub Pages to Webflow

on:
  push:
    branches:
      - main
    paths:
      - "*.html"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history so git diff HEAD~1 works

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Find Changed HTML File
        id: changed
        shell: bash
        run: |
          # Fallback check: If HEAD~1 doesn't exist (first commit), diff against an empty tree
          if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            FILE=$(git diff --name-only HEAD~1 HEAD | grep '\.html$' | head -1)
          else
            FILE=$(git diff-tree --no-commit-id --name-only -r HEAD | grep '\.html$' | head -1)
          fi

          if [ -z "$FILE" ]; then
            echo "No HTML file changed."
            exit 0
          fi

          echo "Changed file: $FILE"
          echo "HTML_FILE=$FILE" >> $GITHUB_ENV

      - name: Sync to Webflow
        env:
          WEBFLOW_TOKEN: ${{ secrets.WEBFLOW_TOKEN }}
          COLLECTION_ID: 69e88bdf798339812888e292
          GITHUB_PAGES: https://neha-coditation.github.io/Case-Studies
        run: |
          python scripts/sync_webflow.py
